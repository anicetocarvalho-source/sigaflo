name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Vitest (offline sync)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run offline sync tests (gating)
        # Falha o build se qualquer teste de sincronização offline quebrar.
        run: bunx vitest run src/lib/offline/__tests__ --reporter=verbose

      - name: Run full test suite
        # Continua a correr a suite completa para feedback adicional;
        # já falhámos cedo se os testes offline quebrarem.
        run: bunx vitest run
